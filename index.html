<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#060302"/>
<meta http-equiv="X-UA-Compatible" content="IE=edge"/>
<title>Vampir Köylü / Vampire Village — Forge&Play</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --blood:#8a0303;--dark:#3e0000;--gold:#c5a059;--parchment:#e8dcc4;
  --bg:#060302;--card:#0e0604;--border:#3a1a08;--muted:#6a3a20;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:var(--bg);
  background-image:radial-gradient(ellipse at 50% 0%,#1a0808 0%,#060302 60%);
  color:var(--parchment);
  font-family:'Nunito',system-ui,sans-serif;
  min-height:100dvh;overflow-x:hidden;user-select:none;
  -webkit-font-smoothing:antialiased;
}
/* ── SCREENS ── */
.screen{display:none;min-height:100dvh;flex-direction:column;align-items:center;justify-content:center;padding:16px;animation:fadeIn .5s ease;}
.screen.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
/* ── LANG TOGGLE ── */
#lang-toggle{
  position:fixed;top:14px;right:14px;z-index:200;
  background:rgba(0,0,0,.7);border:1px solid var(--border);
  color:var(--gold);padding:6px 14px;border-radius:20px;
  font-family:'Cinzel',serif;font-size:.75rem;font-weight:700;
  cursor:pointer;transition:all .2s;letter-spacing:.05em;
  backdrop-filter:blur(6px);
}
#lang-toggle:hover{border-color:var(--gold);background:rgba(138,3,3,.3);}
/* ── TYPOGRAPHY ── */
.t-title{font-family:'Cinzel Decorative',serif;}
.t-head{font-family:'Cinzel',serif;}
.t-body{font-family:'Nunito',sans-serif;}
/* ── CARD ── */
.card{
  background:rgba(8,3,1,.92);border:1px solid var(--border);
  border-radius:14px;padding:22px;width:100%;max-width:460px;
  box-shadow:0 24px 60px rgba(0,0,0,.95),inset 0 1px 0 rgba(255,255,255,.03);
  overflow:hidden;
}
/* ── INPUTS ── */
input{
  background:rgba(0,0,0,.7);border:2px solid var(--border);
  color:var(--parchment);padding:13px 16px;border-radius:10px;width:100%;
  font-size:.95rem;font-family:'Nunito',sans-serif;font-weight:700;
  outline:none;transition:.3s;
}
input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(197,160,89,.1);}
input::placeholder{color:#4a2a18;font-weight:600;}
/* ── BUTTONS ── */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:13px 20px;border:none;border-radius:10px;
  font-family:'Cinzel',serif;font-weight:700;font-size:.88rem;
  cursor:pointer;transition:all .2s;letter-spacing:.06em;
}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;}
.btn-primary{
  background:linear-gradient(135deg,#b31010,#7a0000);
  color:#fff;border:1px solid rgba(255,80,80,.3);
  box-shadow:0 4px 20px rgba(138,3,3,.4);
}
.btn-primary:hover:not(:disabled){
  background:linear-gradient(135deg,#cc1414,#990000);
  box-shadow:0 6px 25px rgba(138,3,3,.6);transform:translateY(-2px);
}
.btn-sec{background:rgba(0,0,0,.5);color:#aaa;border:1px solid #3a2010;}
.btn-sec:hover:not(:disabled){border-color:var(--gold);color:var(--gold);}
.btn-purple{background:rgba(90,40,160,.2);color:#c4a0ff;border:1px solid rgba(140,70,255,.35);}
.btn-purple:hover{background:rgba(90,40,160,.35);border-color:rgba(140,70,255,.6);}
.btn-gold{background:rgba(197,160,89,.12);color:var(--gold);border:1px solid rgba(197,160,89,.35);}
.btn-gold:hover{background:rgba(197,160,89,.22);}
/* ── TABS ── */
.tabs{display:flex;background:rgba(0,0,0,.6);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.tab{flex:1;padding:11px 8px;text-align:center;cursor:pointer;font-family:'Cinzel',serif;font-size:.78rem;font-weight:700;color:#666;transition:.3s;letter-spacing:.04em;}
.tab.active{background:var(--blood);color:#fff;}
/* ── AVATAR GRID ── */
.av-grid{
  display:grid;grid-template-columns:repeat(10,1fr);gap:4px;
  background:rgba(0,0,0,.35);padding:10px;border-radius:10px;
  border:1px solid var(--border);width:100%;
}
.av-btn{
  background:rgba(30,10,5,.6);border:2px solid transparent;border-radius:7px;
  font-size:1rem;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;
  width:100%;aspect-ratio:1;min-width:0;overflow:hidden;padding:0;
}
.av-btn.sel{background:var(--blood);border-color:#ff6666;transform:scale(1.08);box-shadow:0 0 10px rgba(138,3,3,.5);}
.av-btn:hover:not(.sel){border-color:var(--muted);transform:scale(1.04);}
/* ── PLAYER LIST ── */
.plist{display:flex;flex-direction:column;gap:5px;width:100%;max-height:38vh;overflow-y:auto;}
.pitem{
  display:flex;align-items:center;gap:12px;
  background:rgba(0,0,0,.4);border:1px solid var(--border);
  border-left:3px solid var(--border);border-radius:8px;
  padding:11px 13px;font-size:.9rem;font-weight:700;transition:.2s;
}
.pitem.me{border-left-color:var(--gold);}
.pitem.dead{opacity:.3;text-decoration:line-through;pointer-events:none;}
.pitem.votable:hover{border-left-color:var(--blood);background:rgba(138,3,3,.12);cursor:pointer;}
.pitem.sel-vote{border-left-color:var(--gold)!important;border-left-width:4px;background:rgba(197,160,89,.07);}
.pitem.my-vote{border-left-color:var(--blood);background:rgba(138,3,3,.1);}
/* ── ROLE CARD ── */
.rcard-wrap{perspective:1000px;width:200px;height:310px;cursor:pointer;margin:16px auto;}
.rcard-inner{width:100%;height:100%;transform-style:preserve-3d;transition:transform .7s cubic-bezier(.4,0,.2,1);}
.rcard-wrap.flipped .rcard-inner{transform:rotateY(180deg);}
.rface{
  position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:2px solid var(--border);padding:16px;text-align:center;
}
.rface-front{background:linear-gradient(160deg,#100804,#060302);}
.rface-back{transform:rotateY(180deg);background:var(--card);}
/* ── TIMER ── */
.timer{
  font-family:'Cinzel Decorative',serif;font-size:3rem;font-weight:700;
  color:var(--gold);text-shadow:0 0 20px rgba(197,160,89,.3);line-height:1;
}
.timer.urgent{color:var(--blood);animation:tpulse 1s infinite;text-shadow:0 0 20px rgba(138,3,3,.5);}
@keyframes tpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
/* ── HOST/WAIT ── */
.host-only{display:none;}
.wait-txt{
  display:none;color:#555;font-style:italic;
  margin-top:14px;text-align:center;font-size:.88rem;font-weight:600;
}
body.is-host .host-only{display:flex;}
body.is-host .wait-txt{display:none;}
body:not(.is-host) .host-only{display:none!important;}
body:not(.is-host) .wait-txt{display:block;}
/* ── NIGHT CHOICES ── */
.nchoice{
  display:flex;align-items:center;gap:12px;
  background:rgba(0,0,0,.4);border:2px solid var(--border);
  border-radius:10px;padding:11px 14px;cursor:pointer;
  transition:.2s;margin-bottom:5px;font-weight:700;font-size:.9rem;
}
.nchoice:hover{border-color:#6a3010;background:rgba(138,3,3,.1);}
.nchoice.chosen{border-color:var(--blood);background:rgba(138,3,3,.18);}
/* ── EVENTS ── */
.evbox{
  background:rgba(0,0,0,.5);border:1px dashed rgba(138,3,3,.5);
  border-radius:10px;padding:14px;margin:10px 0;text-align:center;
  font-weight:600;font-size:.9rem;line-height:1.6;
}
/* ── VOTE BAR ── */
.vbar{position:absolute;left:0;top:0;bottom:0;background:rgba(138,3,3,.18);border-radius:8px;transition:width .5s;}
/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:flex;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(8px);}
.modal-box{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  width:100%;max-width:450px;max-height:92dvh;display:flex;flex-direction:column;
  overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.95);
}
.modal-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-body{padding:18px;overflow-y:auto;flex:1;}
.modal-foot{padding:12px 18px;border-top:1px solid var(--border);flex-shrink:0;}
/* ── DOTS ── */
.dots{display:flex;justify-content:center;gap:5px;margin-bottom:10px;}
.dot{height:4px;border-radius:3px;cursor:pointer;transition:all .3s;}
.dot.on{width:20px;background:var(--blood);}
.dot:not(.on){width:4px;background:rgba(138,3,3,.25);}
/* ── BATS ── */
.bat{position:fixed;pointer-events:none;z-index:0;opacity:.12;animation:batfly linear infinite;}
@keyframes batfly{0%{transform:translateX(-60px) translateY(0)}100%{transform:translateX(110vw) translateY(var(--dy,0px))}}
/* ── STARS (win) ── */
.star{position:fixed;pointer-events:none;z-index:200;animation:sfall linear infinite;}
@keyframes sfall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(105vh) rotate(540deg);opacity:0}}
/* ── UTILS ── */
.hidden{display:none!important;}
.tc{text-align:center;}
.mt1{margin-top:6px;}.mt2{margin-top:12px;}.mt3{margin-top:18px;}
.mb1{margin-bottom:6px;}.mb2{margin-bottom:12px;}
.row{display:flex;gap:8px;}
.col{display:flex;flex-direction:column;}
.ac{align-items:center;}
.jb{justify-content:space-between;}
/* ── ERROR ── */
#err{display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:999;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
/* ── SCROLL ── */
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
/* ── ROLE COUNT PREVIEW ── */
.role-preview{
  background:rgba(0,0,0,.35);border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;font-size:.82rem;color:#888;
  text-align:center;font-weight:600;margin-top:8px;
}
/* ── SECTION LABEL ── */
.slabel{font-family:'Cinzel',serif;font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.2em;display:block;margin-bottom:7px;}
</style>
</head>
<body>

<!-- Lang Toggle -->
<button id="lang-toggle" onclick="toggleLang()">🌐 EN</button>

<!-- Error -->
<div id="err">
  <div style="font-size:4rem;margin-bottom:12px">🔒</div>
  <h2 class="t-head" style="font-size:1.6rem;color:var(--blood);margin-bottom:8px" id="err-title">Erişim Kısıtlı</h2>
  <p style="color:#999;font-size:.95rem;margin-bottom:20px" id="err-body">Bu oyuna yalnızca <strong style="color:var(--gold)">Forge&Play</strong> üzerinden erişilebilir.</p>
  <a href="https://www.forgeandplay.com" class="btn btn-primary" style="width:auto;padding:12px 28px;text-decoration:none" id="err-btn">forgeandplay.com'a Git</a>
</div>

<!-- Bats -->
<div id="bats"></div>

<!-- ── NASIL OYNANIR ── -->
<div id="modal-howto" class="modal-bg hidden">
  <div class="modal-box">
    <div class="modal-head" id="howto-head">
      <div class="row ac" style="gap:12px">
        <div id="howto-icon" style="width:42px;height:42px;background:rgba(0,0,0,.5);border:1px solid var(--border);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;"></div>
        <div>
          <div class="t-head" id="howto-section-label" style="font-size:.65rem;color:#555;letter-spacing:.2em;text-transform:uppercase;"></div>
          <div class="t-head" id="howto-title" style="font-size:1.1rem;color:var(--parchment);margin-top:2px;font-weight:700;"></div>
        </div>
      </div>
      <button onclick="closeHowto()" style="width:32px;height:32px;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:8px;color:var(--gold);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">✕</button>
    </div>
    <div class="modal-body" id="howto-body"></div>
    <div class="modal-foot">
      <div class="dots" id="howto-dots"></div>
      <div class="row" style="gap:8px">
        <button class="btn btn-sec" id="howto-prev" onclick="howtoNav(-1)" style="flex:1;font-size:.82rem">← <span class="i18n" data-key="prev"></span></button>
        <button class="btn btn-primary" id="howto-next" onclick="howtoNav(1)" style="flex:1;font-size:.82rem"></button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════ SCREENS ══════════════ -->

<!-- 1. SETUP -->
<div id="s-setup" class="screen active">
  <div style="width:100%;max-width:440px;z-index:2;position:relative;">
    <div class="tc" style="margin-bottom:22px">
      <div style="font-size:64px;line-height:1;filter:drop-shadow(0 0 28px rgba(138,3,3,.8));animation:tpulse 3s infinite">🧛</div>
      <div style="display:flex;justify-content:center;gap:3px;margin:6px 0 3px">
        <div style="width:3px;background:var(--blood);border-radius:0 0 3px 3px;animation:tpulse 2s infinite;height:10px"></div>
        <div style="width:3px;background:var(--blood);border-radius:0 0 3px 3px;animation:tpulse 2s .3s infinite;height:14px"></div>
        <div style="width:3px;background:var(--blood);border-radius:0 0 3px 3px;animation:tpulse 2s .6s infinite;height:10px"></div>
      </div>
      <h1 class="t-title" id="main-title" style="font-size:2.8rem;color:var(--blood);text-shadow:0 0 40px rgba(138,3,3,.7),0 2px 0 #000;line-height:1.1;letter-spacing:.04em">Vampir Köylü</h1>
      <p class="t-head" id="main-sub" style="font-size:.7rem;color:var(--muted);letter-spacing:.35em;text-transform:uppercase;margin-top:5px">Online Sosyal Dedüksiyon</p>
    </div>

    <div class="card">
      <div class="tabs mb2" id="setup-tabs">
        <div class="tab active" id="tab-home" onclick="sTab('home')" data-key="tab_home">🏠 Ana Menü</div>
        <div class="tab" id="tab-create" onclick="sTab('create')" data-key="tab_create">⚰️ Oda Kur</div>
        <div class="tab" id="tab-join" onclick="sTab('join')" data-key="tab_join">🗡️ Katıl</div>
      </div>

      <!-- Profile (shared) -->
      <div id="profile-section">
        <label class="slabel" id="lbl-name"></label>
        <input id="inp-name" type="text" maxlength="20" autocomplete="off" id="inp-name"/>
        <label class="slabel mt2" id="lbl-avatar"></label>
        <div class="av-grid" id="av-grid"></div>
      </div>

      <!-- HOME panel -->
      <div id="pan-home" class="col mt2" style="gap:9px">
        <button class="btn btn-primary" id="btn-home-create" onclick="sTab('create')" disabled></button>
        <button class="btn btn-sec" id="btn-home-join" onclick="sTab('join')" disabled></button>
        <button class="btn btn-purple" onclick="openHowto()">📖 <span id="btn-howto-lbl"></span></button>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:4px">
          <div style="background:rgba(138,3,3,.12);border:1px solid rgba(138,3,3,.3);border-radius:10px;padding:10px;text-align:center">
            <div style="font-size:1.4rem">🧛</div>
            <div class="t-head" style="font-size:.7rem;color:#ff6b6b;margin-top:4px" id="rl-vamp-lbl"></div>
            <div style="font-size:.65rem;color:#555;margin-top:2px" id="rl-vamp-sub"></div>
          </div>
          <div style="background:rgba(0,120,0,.08);border:1px solid rgba(0,150,0,.2);border-radius:10px;padding:10px;text-align:center">
            <div style="font-size:1.4rem">🏘️</div>
            <div class="t-head" style="font-size:.7rem;color:#90ee90;margin-top:4px" id="rl-vill-lbl"></div>
            <div style="font-size:.65rem;color:#555;margin-top:2px" id="rl-vill-sub"></div>
          </div>
          <div style="background:rgba(0,60,180,.08);border:1px solid rgba(50,100,255,.2);border-radius:10px;padding:10px;text-align:center">
            <div style="font-size:1.4rem">💉</div>
            <div class="t-head" style="font-size:.7rem;color:#6ab3ff;margin-top:4px" id="rl-doc-lbl"></div>
            <div style="font-size:.65rem;color:#555;margin-top:2px" id="rl-doc-sub"></div>
          </div>
          <div style="background:rgba(130,100,0,.08);border:1px solid rgba(200,160,0,.2);border-radius:10px;padding:10px;text-align:center">
            <div style="font-size:1.4rem">🔍</div>
            <div class="t-head" style="font-size:.7rem;color:#ffd700;margin-top:4px" id="rl-det-lbl"></div>
            <div style="font-size:.65rem;color:#555;margin-top:2px" id="rl-det-sub"></div>
          </div>
        </div>
      </div>

      <!-- CREATE panel -->
      <div id="pan-create" class="hidden mt2">
        <label class="slabel" id="lbl-player-count"></label>
        <div style="display:flex;gap:5px;flex-wrap:wrap" id="count-btns"></div>
        <div class="role-preview" id="role-preview-txt"></div>
        <button class="btn btn-primary mt2" id="btn-do-create" onclick="doCreate()" disabled></button>
      </div>

      <!-- JOIN panel -->
      <div id="pan-join" class="hidden mt2">
        <label class="slabel" id="lbl-code"></label>
        <input id="inp-code" type="text" maxlength="4" autocomplete="off"
          style="text-align:center;font-size:2.2rem;letter-spacing:.6em;text-transform:uppercase;font-family:'Cinzel Decorative',serif;"/>
        <button class="btn btn-sec mt2" id="btn-do-join" onclick="doJoin()" disabled></button>
      </div>
    </div>
    <p class="t-head tc" style="font-size:.6rem;color:#2a1008;margin-top:10px;letter-spacing:.15em">FORGE&PLAY</p>
  </div>
</div>

<!-- 2. LOBBY -->
<div id="s-lobby" class="screen">
  <div style="width:100%;max-width:460px">
    <div class="tc mb2">
      <h2 class="t-title" id="lobby-title" style="font-size:1.6rem;color:var(--gold);margin-bottom:8px"></h2>
      <div style="display:inline-block;background:rgba(0,0,0,.55);border:1px solid var(--border);padding:6px 20px;border-radius:20px">
        <span class="t-head" style="font-size:.65rem;color:#555;" id="lbl-code2"></span>
        <span class="t-title" id="lobby-code" style="font-size:1.5rem;color:var(--gold);letter-spacing:.3em;margin-left:6px"></span>
      </div>
      <p style="font-size:.82rem;color:#444;margin-top:6px;font-weight:600" id="lobby-min-txt"></p>
    </div>
    <ul class="plist" id="lobby-list"></ul>
    <div class="row mt2 host-only" style="gap:8px">
      <button class="btn btn-sec" id="btn-bot" onclick="addBot()" style="flex:1;font-size:.82rem"></button>
      <button class="btn btn-primary" id="btn-start" onclick="startGame()" disabled style="flex:2;font-size:.88rem"></button>
    </div>
    <p class="wait-txt" id="lobby-wait"></p>
  </div>
</div>

<!-- 3. ROLE CARD -->
<div id="s-role" class="screen">
  <div class="tc" style="width:100%;max-width:380px">
    <h2 class="t-title" id="role-title" style="color:var(--gold);font-size:1.3rem;margin-bottom:4px"></h2>
    <p style="color:#555;font-size:.85rem;font-weight:600;margin-bottom:2px" id="role-tap"></p>
    <div class="rcard-wrap" id="rcard" onclick="flipCard()">
      <div class="rcard-inner">
        <div class="rface rface-front">
          <div style="font-size:3.5rem;opacity:.15;color:var(--border)">?</div>
          <p class="t-head" style="color:#2a1008;font-size:.7rem;margin-top:10px;letter-spacing:.15em" id="front-tap"></p>
        </div>
        <div class="rface rface-back" id="rface-back"></div>
      </div>
    </div>
    <div id="team-box" class="hidden" style="background:rgba(138,3,3,.1);border:1px solid rgba(138,3,3,.25);border-radius:10px;padding:14px;margin-top:4px">
      <p class="t-head" id="team-lbl" style="font-size:.65rem;color:var(--blood);letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px">🩸 VAMPİR KARDEŞLERİN</p>
      <div id="team-list" style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap"></div>
    </div>
    <button class="btn btn-gold mt3 host-only" id="btn-go-night" onclick="goToNight()"></button>
    <p class="wait-txt" id="role-wait"></p>
  </div>
</div>

  if(name.length<2)return;
  const code=Math.random().toString(36).substring(2,6).toUpperCase();
  myRoomId=code;
  await setDoc(rRef(),{hostId:myUid,status:'lobby',phase:1,winner:null,events:[],dayVotes:{},
    nightActions:{submitted:{},vampireVotes:{},target:null,doctorSave:null,detectiveTarget:null}});

// ── JOIN ROOM ─────────────────────────────────────────────────────────────────
window.doJoin=async()=>{
  const name=sanitize($('inp-name').value.trim());
  const code=$('inp-code').value.trim().toUpperCase();
  if(name.length<2||code.length!==4)return;
  const snap=await getDoc(rRef());
  // rRef uses myRoomId — set it first
  myRoomId=code;
  const snap2=await getDoc(rRef());
  if(!snap2.exists())return alert('Room not found!');
  if(snap2.data().status!=='lobby')return alert('Game already started!');
  if(Object.keys(snap2.data().players||{}).length>=10)return alert('Room full!');
  await setDoc(pRef(myUid),{name,avatar:window.selAvatar,role:null,isAlive:true,isBot:false,isHost:false});
  listenRoom(code);
};

// ── START GAME ────────────────────────────────────────────────────────────────
window.startGame=async()=>{
  const ids=Object.keys(pData);
  if(ids.length<4)return alert('Need at least 4 players!');
  const roles=assignRoles(ids);
  const upd={status:'role_reveal'};
  ids.forEach(id=>upd[`p.${id}.role`]=roles[id]);
  // Use per-field updates
  const playerUpds={};
  ids.forEach(id=>{playerUpds[id]=roles[id];});
  // Update each player doc individually for reliability
  await Promise.all(ids.map(id=>updateDoc(pRef(id),{role:roles[id]})));
  await updateDoc(rRef(),{status:'role_reveal'});
};

function assignRoles(ids){
  const n=ids.length;
  let list=n<=4?['vampire','doctor',...Array(n-2).fill('villager')]:
    n<=6?['vampire','vampire','doctor',...Array(n-3).fill('villager')]:
    n<=9?['vampire','vampire','doctor','detective',...Array(n-4).fill('villager')]:
    ['vampire','vampire','vampire','doctor','detective',...Array(n-5).fill('villager')];
  for(let i=list.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[list[i],list[j]]=[list[j],list[i]];}
  const m={};ids.forEach((id,i)=>m[id]=list[i]);return m;
}

// ── ROOM LISTENER ─────────────────────────────────────────────────────────────
function listenRoom(code){
  myRoomId=code;
  $('lobby-code').textContent=code;
  showScreen('s-lobby');

  onSnapshot(rRef(),(snap)=>{
    if(!snap.exists()){myRoomId=null;showScreen('s-setup');return;}
    roomData=snap.data();
    renderRoom();
  });

  onSnapshot(pCol(),(snap)=>{
    pData={};
    snap.forEach(d=>{pData[d.id]={...d.data(),id:d.id};});
    buildLobbyList();
    if($('btn-start'))$('btn-start').disabled=Object.keys(pData).length<4;
    // If we're on role screen and role just arrived, re-render card
    if(roomData?.status==='role_reveal')setupRoleCard();
  });
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
}

function setHost(isHost){document.body.classList.toggle('is-host',isHost);}

}

// ── RENDER ROOM ───────────────────────────────────────────────────────────────
function renderRoom(){
  if(!roomData)return;
  const isHost=roomData.hostId===myUid;
  setHost(isHost);
  const st=roomData.status;
  applyLang();

  if(st==='lobby'){
    showScreen('s-lobby');
    return;
  }

  if(st==='role_reveal'){
    showScreen('s-role');
    setupRoleCard(); // will set up if role available
    return;
  }

  if(st==='night'){
    showScreen('s-night');
    $('night-title').textContent=`${t('night_title')} ${roomData.phase||1}`;
    if(!nightDone)buildNightPanel();
    const submitted=roomData.nightActions?.submitted||{};
    const aliveP=Object.values(pData).filter(p=>p.isAlive);
    const subCount=aliveP.filter(p=>submitted[p.id]).length;
    const waitEl=$('night-wait');
    waitEl.textContent=`${subCount}/${aliveP.length} ${t('night_submit_wait')}`;
    if(isHost&&aliveP.length>0&&aliveP.every(p=>submitted[p.id]))processNight();
    // Server-synced timer: use phaseEndTime from Firestore if available
    const nightEnd=roomData.phaseEndTime||Date.now()+45000;
    startTimerFromEnd('timer-night',nightEnd,async()=>{if(!nightDone)await submitNight();});
    return;
  }

  if(st==='day'){
    showScreen('s-day');
    $('day-title').textContent=`${t('day_title')} ${roomData.phase||1}`;
    buildDayList();
    const evts=roomData.events||[];
    const eBox=$('day-events');
    if(evts.length>0){eBox.classList.remove('hidden');eBox.innerHTML=evts.map(e=>`<p style="margin:3px 0">${e}</p>`).join('');}
    else eBox.classList.add('hidden');
    if(!$('qtxt').textContent.trim())showQ();
    const dayEnd=roomData.phaseEndTime||Date.now()+90000;
    startTimerFromEnd('timer-day',dayEnd);
    return;
  }

  if(st==='vote'){
    showScreen('s-vote');
    myVote=roomData.dayVotes?.[myUid]||null;
    buildVoteList();
    const me=pData[myUid];
    if(me&&!me.isAlive){$('btn-vote').classList.add('hidden');$('dead-vote').classList.remove('hidden');}
    else{$('btn-vote').classList.remove('hidden');$('dead-vote').classList.add('hidden');}
    if(isHost&&roomData.dayVotes){
      const alive=Object.values(pData).filter(p=>p.isAlive);
      if(alive.length>0&&alive.every(p=>roomData.dayVotes[p.id]))endVoting();
    }
    const voteEnd=roomData.phaseEndTime||Date.now()+60000;
    startTimerFromEnd('timer-vote',voteEnd,()=>{if(isHost)endVoting();});
    return;
  }

  if(st==='result'){
    showScreen('s-result');
    const el=roomData.lastElim||{};
    if(el.role==='tie'){
      $('res-icon').textContent='⚖️';
      $('res-title').textContent=t('res_tie');$('res-title').style.color='var(--gold)';
      $('res-name').textContent=t('tie_name');$('res-name').style.color='var(--parchment)';
      $('res-role').textContent=t('tie_role');
    } else {
      const r=RLKEYS[el.role]||RLKEYS.villager;
      $('res-icon').textContent='💀';
      $('res-title').textContent=t('res_elim');$('res-title').style.color='var(--blood)';
      $('res-name').textContent=el.name||'?';$('res-name').style.color='var(--blood)';
      $('res-role').innerHTML=`${t('res_role_pre')} <span style="color:${r.color};font-family:'Cinzel',serif;font-weight:700">${r.emoji} ${t('r_'+(el.role||'villager'))}</span>`;
    }
    return;
  }

  if(st==='game_over'){
    showScreen('s-over');
    const w=roomData.winner;
    const me=pData[myUid];
    $('over-icon').textContent=w==='vampires'?'🧛':'🏘️';
    $('over-title').textContent=t(w==='vampires'?'vamp_win':'vill_win');
    $('over-title').style.color=w==='vampires'?'var(--blood)':'var(--gold)';
    $('over-desc').textContent=t(w==='vampires'?'vamp_desc':'vill_desc');
    $('over-roles').innerHTML=Object.values(pData).map(p=>{
      const r=RLKEYS[p.role]||RLKEYS.villager;
      return`<div style="background:${r.bg};border:1px solid ${r.border};border-radius:10px;padding:10px;text-align:center;${!p.isAlive?'opacity:.35':''}">
        <div style="font-size:1.4rem">${p.avatar} ${r.emoji}</div>
        <div class="t-head" style="font-size:.78rem;color:var(--parchment);margin-top:3px;font-weight:700">${p.name}</div>
        <div style="font-size:.68rem;color:${r.color};margin-top:2px">${t('r_'+p.role)}</div>
        ${!p.isAlive?`<div style="font-size:.65rem;color:var(--blood);margin-top:2px">💀</div>`:''}
      </div>`;
    }).join('');
    const iWon=(w==='vampires'&&me?.role==='vampire')||(w==='villagers'&&me?.role!=='vampire');
    if(iWon)makeStars();
    return;
  }
}

// ── NIGHT ─────────────────────────────────────────────────────────────────────
window.goToNight=async()=>{
  await updateDoc(rRef(),{status:'night',phaseEndTime:Date.now()+45000,nightActions:{submitted:{},vampireVotes:{},target:null,doctorSave:null,detectiveTarget:null}});
};

function buildNightPanel(){
  const me=pData[myUid];
  const role=me?.role;
  const panel=$('night-panel');
  nightDone=false;nightChoice=null;
  if(!me?.isAlive){panel.innerHTML=`<div class="tc" style="color:#444;padding:28px 0;font-weight:600">${t('night_dead')}</div>`;return;}
  if(role==='villager'){
    panel.innerHTML=`<div class="tc" style="padding:28px 0"><div style="font-size:3.5rem;opacity:.25">${t('night_sleep')}</div><p style="color:#444;margin-top:12px;font-size:.9rem;font-weight:600;line-height:1.5">${t('night_sleep_txt').replace('\n','<br>')}</p></div>`;
    return;
  }
  const alive=Object.values(pData).filter(p=>p.isAlive&&p.id!==myUid);
  const nonV=alive.filter(p=>p.role!=='vampire');
  const targets=role==='vampire'?nonV:role==='doctor'?[pData[myUid],...alive]:alive;
  const r=RLKEYS[role];
  const hint=role==='vampire'?t('v_hint'):role==='doctor'?t('doc_hint'):t('det_hint');
  let html=`<div style="background:rgba(0,0,0,.3);border-radius:10px;border:1px solid var(--border);padding:14px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <span style="font-size:1.3rem">${r.emoji}</span>
      <h3 class="t-head" style="color:${r.color};font-size:1rem;font-weight:700">${hint}</h3>
    </div>`;
  targets.forEach(p=>{
    const prev=detHistory[p.id];
    const badge=prev!==undefined?(prev?` <span style="color:var(--blood);font-size:.72rem;font-weight:800">🧛 ${t('r_vampire')}</span>`:`<span style="color:#90ee90;font-size:.72rem;font-weight:800"> ✓</span>`):'';
    html+=`<div class="nchoice" id="nc-${p.id}" onclick="selectNight('${p.id}')">
      <span style="font-size:1.3rem">${p.avatar}</span>
      <span style="flex:1;font-weight:700;font-size:.9rem">${p.name}${p.id===myUid?` <span style="color:#555;font-size:.72rem">${t('you')}</span>`:''}</span>
      ${badge}
    </div>`;
  });
  html+=`<button class="btn btn-primary mt2" id="btn-night-ok" onclick="submitNight()">${t('btn_confirm')}</button></div>`;
  panel.innerHTML=html;
}
window.selectNight=id=>{
  nightChoice=id;
  document.querySelectorAll('.nchoice').forEach(el=>el.classList.remove('chosen'));
  const el=$('nc-'+id);if(el)el.classList.add('chosen');
};
window.submitNight=async()=>{
  if(nightDone)return;
  const me=pData[myUid];
  if(me?.role!=='villager'&&!nightChoice)return alert(window.lang==='tr'?'Bir hedef seçmelisin!':'Choose a target!');
  nightDone=true;
  $('night-panel').innerHTML=`<div class="tc" style="padding:28px 0"><div style="font-size:2.5rem;animation:tpulse 2s infinite">🌙</div><p style="color:#444;margin-top:12px;font-size:.88rem;font-weight:600">${t('night_wait')}</p></div>`;
  $('night-wait').classList.remove('hidden');
  const upd={[`nightActions.submitted.${myUid}`]:true};
  const role=me?.role;
  if(role==='vampire'&&nightChoice)upd[`nightActions.vampireVotes.${myUid}`]=nightChoice;
  if(role==='doctor'&&nightChoice)upd['nightActions.doctorSave']=nightChoice;
  if(role==='detective'&&nightChoice)upd['nightActions.detectiveTarget']=nightChoice;
  if(roomData?.hostId===myUid){
    const bots=Object.values(pData).filter(p=>p.isBot&&p.isAlive);
    const alive=Object.values(pData).filter(p=>p.isAlive);
    const nonV=alive.filter(p=>p.role!=='vampire');
    const sub=roomData.nightActions?.submitted||{};
    for(const bot of bots){
      if(sub[bot.id])continue;
      upd[`nightActions.submitted.${bot.id}`]=true;
      if(bot.role==='vampire'&&nonV.length>0)upd[`nightActions.vampireVotes.${bot.id}`]=rand(nonV).id;
      else if(bot.role==='doctor'&&alive.length>0)upd['nightActions.doctorSave']=rand(alive).id;
      else if(bot.role==='detective'){const c=alive.filter(p=>p.id!==bot.id);if(c.length)upd['nightActions.detectiveTarget']=rand(c).id;}
    }
  }
  await updateDoc(rRef(),upd);
};

// ── PROCESS NIGHT (host) ──────────────────────────────────────────────────────
async function processNight(){
  const na=roomData.nightActions||{};
  const vv=na.vampireVotes||{};
  const vc={};Object.values(vv).forEach(v=>{vc[v]=(vc[v]||0)+1;});
  const vampTarget=Object.entries(vc).sort((a,b)=>b[1]-a[1])[0]?.[0]||null;
  const docSave=na.doctorSave||null;
  const detTgt=na.detectiveTarget||null;
  if(detTgt&&pData[detTgt])detHistory[detTgt]=pData[detTgt].role==='vampire';
  const events=[];
  const updP={};
  if(vampTarget){
    if(vampTarget===docSave){events.push(t('ev_saved'));}
    else{
      const v=pData[vampTarget];
      if(v){updP[`p.${vampTarget}.isAlive`]=false;events.push(`${t('ev_killed_pre')} ${v.name} ${t('ev_killed_suf')}`);}
    }
  } else events.push(t('ev_safe'));
  const newP={...pData};
  if(vampTarget&&vampTarget!==docSave&&newP[vampTarget])newP[vampTarget]={...newP[vampTarget],isAlive:false};
  const winner=checkWin(newP);
  const up={events,dayVotes:{},status:winner?'game_over':'day',winner:winner||null};
  if(vampTarget&&vampTarget!==docSave)up[`players.${vampTarget}.isAlive`]=false;
  // Update player docs
  if(vampTarget&&vampTarget!==docSave)await updateDoc(pRef(vampTarget),{isAlive:false});
  await updateDoc(rRef(),{events,dayVotes:{},status:winner?'game_over':'day',phaseEndTime:Date.now()+90000,winner:winner||null});
}

// ── DAY ───────────────────────────────────────────────────────────────────────
function buildDayList(){
  const list=$('day-list');list.innerHTML='';
  Object.values(pData).forEach(p=>{
    const li=document.createElement('li');
    li.className='pitem'+(p.id===myUid?' me':'')+(p.isAlive?'':' dead');
    li.innerHTML=`<span style="font-size:1.3rem">${p.avatar}</span><span style="flex:1;font-size:.9rem">${p.name}${p.id===myUid?` <span style="color:#555;font-size:.72rem">${t('you')}</span>`:''}</span>${!p.isAlive?'<span>💀</span>':''}`;
    list.appendChild(li);
  });
}
window.showQ=()=>{
  const el=$('qtxt');el.style.opacity=0;
  setTimeout(()=>{el.textContent=`"${rand(t('questions'))}"`;el.style.transition='opacity .3s';el.style.opacity=1;},300);
};
window.startVoting=async()=>updateDoc(rRef(),{status:'vote',phaseEndTime:Date.now()+60000,dayVotes:{}});

// ── VOTE ──────────────────────────────────────────────────────────────────────
function buildVoteList(){
  const list=$('vote-list');list.innerHTML='';
  const votes=roomData?.dayVotes||{};
  const counts={};Object.values(votes).forEach(v=>{counts[v]=(counts[v]||0)+1;});
  const maxV=Math.max(0,...Object.values(counts));
  Object.values(pData).filter(p=>p.isAlive).forEach(p=>{
    const li=document.createElement('li');
    li.className='pitem votable'+(myVote===p.id?' my-vote':'')+(selVote===p.id?' sel-vote':'');
    li.style.position='relative';li.style.overflow='hidden';
    const vc=counts[p.id]||0;
    const pct=maxV>0?(vc/maxV)*100:0;
    li.innerHTML=`<div class="vbar" style="width:${pct}%"></div>
      <span style="font-size:1.3rem;position:relative;z-index:1">${p.avatar}</span>
      <span style="flex:1;font-size:.9rem;position:relative;z-index:1">${p.name}${p.id===myUid?` <span style="color:#555;font-size:.72rem">${t('you')}</span>`:''}</span>
      ${vc>0?`<span style="color:var(--blood);font-family:'Cinzel',serif;font-size:.85rem;font-weight:700;position:relative;z-index:1">${vc} ${t('oy_lbl')}</span>`:''}`;
    if(p.id!==myUid&&pData[myUid]?.isAlive){li.onclick=()=>{selVote=p.id;buildVoteList();};}
    list.appendChild(li);
  });
}
window.submitVote=async()=>{
  if(!selVote)return alert(window.lang==='tr'?'Birini seç!':'Select someone!');
  if(!pData[myUid]?.isAlive)return;
  myVote=selVote;
  const upd={[`dayVotes.${myUid}`]:selVote};
  if(roomData?.hostId===myUid){
    const alive=Object.values(pData).filter(p=>p.isAlive);
    const existing=roomData?.dayVotes||{};
    for(const bot of alive.filter(p=>p.isBot)){
      if(existing[bot.id])continue;
      const tgts=alive.filter(p=>p.id!==bot.id);
      if(tgts.length)upd[`dayVotes.${bot.id}`]=rand(tgts).id;
    }
  }
  await updateDoc(rRef(),upd);
  buildVoteList();
};
window.endVoting=async()=>{
  const votes=roomData?.dayVotes||{};
  const counts={};Object.values(votes).forEach(v=>{counts[v]=(counts[v]||0)+1;});
  if(!Object.keys(counts).length)return;
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  if(sorted.length>1&&sorted[0][1]===sorted[1][1]){
    await updateDoc(rRef(),{status:'result',lastElim:{name:'',role:'tie'}});return;
  }
  const elimId=sorted[0][0];
  const victim=pData[elimId];
  if(!victim)return;
  await updateDoc(pRef(elimId),{isAlive:false});
  const newP={...pData,[elimId]:{...victim,isAlive:false}};
  const winner=checkWin(newP);
  const ev=[`${t('ev_elim_pre')} ${victim.name} ${t('ev_elim_suf')} ${RLKEYS[victim.role]?.emoji||''}`];
  await updateDoc(rRef(),{status:winner?'game_over':'result',winner:winner||null,lastElim:{name:victim.name,role:victim.role},events:ev});
};

// ── WIN CHECK ─────────────────────────────────────────────────────────────────
function checkWin(players){
  const alive=Object.values(players).filter(p=>p.isAlive);
  const v=alive.filter(p=>p.role==='vampire').length;
  const o=alive.filter(p=>p.role!=='vampire').length;
  if(v===0)return'villagers';
  if(v>=o)return'vampires';
  return null;
}

// ── TIMER — SERVER SYNCED ─────────────────────────────────────────────────────
// phaseEndTime is stored in Firestore (ms timestamp) by host when phase starts.
// All clients read it and count down from there → everyone sees same timer.
function startTimerFromEnd(id, endTime, onDone){
  if(timerIv)clearInterval(timerIv);
  const tick=()=>{
    const el=$(id); if(!el)return;
    const rem=Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
    el.textContent=rem;
    el.classList.toggle('urgent', rem<=10);
    if(rem<=0){clearInterval(timerIv); if(onDone)onDone(); return;}
  };
  tick(); timerIv=setInterval(tick,500);
}
// Fallback: local timer when no endTime stored yet
function startTimer(id,sec,done){
  const endTime=Date.now()+sec*1000;
  startTimerFromEnd(id,endTime,done);
}


// ── STARS ─────────────────────────────────────────────────────────────────────
function makeStars(){
  const c=$('stars');c.innerHTML='';
  ['⭐','🌟','✨','💫'].forEach(s=>{
    for(let j=0;j<5;j++){
      const el=document.createElement('div');el.className='star';el.textContent=s;
      el.style.cssText=`left:${Math.random()*100}%;font-size:${14+Math.random()*14}px;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*2}s;`;
      c.appendChild(el);
    }
  });
}

// ── HOW TO PLAY ───────────────────────────────────────────────────────────────
window.openHowto=()=>{
  window.howtoStep=0;renderHowto();
  $('modal-howto').classList.remove('hidden');
};
window.closeHowto=()=>$('modal-howto').classList.add('hidden');
window.howtoNav=dir=>{
  const steps=t('howto_steps');
  window.howtoStep=Math.max(0,Math.min(steps.length-1,window.howtoStep+dir));
  renderHowto();
};
function renderHowto(){
  const steps=t('howto_steps');
  const s=steps[window.howtoStep];
  if(!s)return;
  $('howto-icon').textContent=s.icon;
  $('howto-title').textContent=s.title;
  $('howto-section-label').textContent=t('howto_label');
  $('howto-head').style.background=`linear-gradient(135deg,${s.c},rgba(8,3,1,.95))`;
  $('howto-body').innerHTML=s.body;
  $('howto-dots').innerHTML=steps.map((_,i)=>`<div class="dot${i===window.howtoStep?' on':''}" onclick="window.howtoStep=${i};renderHowto()"></div>`).join('');
  $('howto-prev').disabled=window.howtoStep===0;
  const nxt=$('howto-next');
  if(window.howtoStep===steps.length-1){
    nxt.textContent=t('ready');nxt.onclick=window.closeHowto;
  } else {
    nxt.textContent=t('next');nxt.onclick=()=>window.howtoNav(1);
  }
}
